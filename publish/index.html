const BOSS_INTERVAL=120;
let W=0,H=0,DPR=1,S=null,last=0,control={auto:true,x:0,y:0,active:false};function resize(){DPR=devicePixelRatio||1;W=canvas.clientWidth;H=canvas.clientHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);new ResizeObserver(resize).observe(document.body);resize();

function start(k){const c=CLASSES[k];S=fresh();S.run=true;S.skills[c.skill]=1;S.player={cls:k,job:c.cn,x:W/2,y:H/2,r:19,hp:c.hp,max:c.hp,base:c.spd,lv:1,xp:0,next:12,vx:0,vy:0,dmg:c.dmg,hit:0};$('start').classList.add('hidden');updateHud()}

function spawnEnemy(boss=false){let pos=edgePos(),d=difficulty();if(boss){let hp=1900*d*(1+Math.floor(S.time/BOSS_INTERVAL)*.45);S.enemies.push({...pos,type:'boss',img:'boss',r:58,hp,max:hp,spd:34+d*4,boss:true,hit:0,slow:0,phase:rand(0,TAU),shoot:0});return}let roll=Math.random(),type=roll<clamp(.72-S.time/420,.32,.72)?'imp':roll<.68?'skeleton':roll<.88?'slime':'eye',cfg={imp:{img:'imp',r:18,hp:24*d,spd:36+d*6,xp:5},skeleton:{img:'skeleton',r:19,hp:34*d,spd:42+d*5,xp:6},slime:{img:'slime',r:25,hp:68*d,spd:24+d*3,xp:9},eye:{img:'eye',r:21,hp:42*d,spd:30+d*2,xp:8,range:260}}[type];S.enemies.push({...pos,type,boss:false,hit:0,slow:0,phase:rand(0,TAU),shoot:rand(2.4,4.4),...cfg,max:cfg.hp})}
function frameOf(t,fps=7){return Math.floor(t*fps)%4}function drawSheet(img,x,y,size,frame,rot=0,sx=1,sy=1,a=1){if(!img.complete){ctx.fillStyle='#fff';ctx.fillRect(x-size/2,y-size/2,size,size);return}const fw=img.width/2,fh=img.height/2;ctx.save();ctx.globalAlpha=a;ctx.translate(x,y);ctx.rotate(rot);ctx.scale(sx,sy);ctx.drawImage(img,frame%2*fw,Math.floor(frame/2)*fh,fw,fh,-size/2,-size/2,size,size);ctx.restore()}function nearest(list,p){let best=null,bd=1e9;for(const it of list){let d=dist(it,p);if(d<bd){bd=d;best=it}}return best}function dmgBase(){return S.player.dmg*(1+S.skills.focus*.12)}
function movePlayer(dt){let p=S.player,fx=0,fy=0;if(!control.auto){fx=control.x;fy=control.y}else{for(const e of S.enemies){let dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy)||1;if(d<150){let f=(150-d)/150*3.2;fx+=dx/d*f;fy+=dy/d*f}}let g=nearest(S.gems,p);if(g){let dx=g.x-p.x,dy=g.y-p.y,d=Math.hypot(dx,dy)||1;fx+=dx/d*1.5;fy+=dy/d*1.5}if(!g&&S.enemies.length){let e=nearest(S.enemies,p),dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy)||1;fx-=dx/d*.25;fy-=dy/d*.25}}let m=Math.hypot(fx,fy),spd=p.base*(1+S.skills.foot*.12);if(m>.05){p.vx=fx/m;p.vy=fy/m;p.x=clamp(p.x+p.vx*spd*dt,24,W-24);p.y=clamp(p.y+p.vy*spd*dt,62,H-24)}else{p.vx*=.82;p.vy*=.82}}

function skills(dt){let p=S.player,db=dmgBase();Object.keys(S.cd).forEach(k=>S.cd[k]-=dt);if(S.skills.regen)p.hp=Math.min(p.max,p.hp+S.skills.regen*.7*dt);if(S.skills.garlic){let lv=skillLv('garlic'),cp=comboPower('garlic'),rad=50+lv*10+cp*4,rate=damageMul(cp),dmg=(14+lv*7)*rate*dt*db;for(const e of S.enemies)if(dist(p,e)<rad+e.r){e.hp-=dmg;e.hit=.08}}let e=nearest(S.enemies,p);if(S.skills.missile&&S.cd.missile<=0&&e){let lv=skillLv('missile'),cp=comboPower('missile'),n=1+countBonus(cp),aoe=cp?22+cp*2:0,slow=cp?Math.min(1.6,.8+cp*.08):0;volley('missile',e,n,370,(30+lv*12)*damageMul(cp)*db,2,aoe,slow);S.cd.missile=Math.max(.42,1.05-lv*.07-Math.min(.18,cp*.025))}if(S.skills.fireball&&S.cd.fireball<=0&&e){let lv=skillLv('fireball'),cp=comboPower('fireball'),n=1+countBonus(cp),aoe=48+lv*4+cp*4;volley('fire',e,n,255,(34+lv*13)*damageMul(cp)*db,2.4,aoe);S.cd.fireball=Math.max(.72,1.8-lv*.08-Math.min(.22,cp*.025))}if(S.skills.iceorb&&S.cd.iceorb<=0&&e){let lv=skillLv('iceorb'),cp=comboPower('iceorb'),n=1+countBonus(cp),slow=1.3+lv*.1+cp*.12;volley('ice',e,n,285,(20+lv*8)*damageMul(cp)*db,2.2,0,slow);S.cd.iceorb=Math.max(.62,1.35-lv*.06-Math.min(.18,cp*.02))}if(S.skills.axe&&S.cd.axe<=0){let lv=skillLv('axe'),cp=comboPower('axe'),n=1+countBonus(cp),t=nearest(S.enemies,p),base=t?Math.atan2(t.y-p.y,t.x-p.x):rand(0,TAU);for(let i=0;i<n;i++){let a=base+(i-(n-1)/2)*.32;S.axes.push({x:p.x,y:p.y,vx:Math.cos(a)*248,vy:Math.sin(a)*248,dmg:(26+lv*12)*damageMul(cp)*db,life:2.55+Math.min(.6,cp*.06),rot:0,hit:new Set()})}S.cd.axe=Math.max(.68,1.7-lv*.07-Math.min(.2,cp*.025))}if(S.skills.lightning&&S.cd.lightning<=0&&S.enemies.length){let lv=skillLv('lightning'),cp=comboPower('lightning'),q=nearest(S.enemies,p),hits=1+countBonus(cp);for(let i=0;i<hits;i++){S.bolts.push({x:q.x,y:q.y,life:.13});for(const m of S.enemies)if(Math.hypot(m.x-q.x,m.y-q.y)<56+cp*2){m.hp-=(55+lv*18)*damageMul(cp)*db;m.hit=.12}}S.shake=.1;S.cd.lightning=Math.max(.9,3-lv*.14-Math.min(.35,cp*.04))}if(S.skills.orbit){let lv=skillLv('orbit'),cp=comboPower('orbit'),count=Math.min(10,1+Math.floor(lv/2)+countBonus(cp)),rad=54+lv*8+cp*2;for(let i=0;i<count;i++){let a=S.time*(2.4+Math.min(.8,cp*.08))+i*TAU/count,x=p.x+Math.cos(a)*rad,y=p.y+Math.sin(a)*rad;for(const e of S.enemies)if(dist({x,y},e)<e.r+14){e.hp-=(10+lv*5)*damageMul(cp)*dt*db;e.hit=.08}}}}
function updateObjs(dt){let p=S.player,pick=110*(1+S.skills.magnet*.22);for(const e of S.enemies){let d=dist(e,p),a=Math.atan2(p.y-e.y,p.x-e.x),slow=e.slow>0?.55:1;if(e.type==='eye'&&!e.boss){if(d<170){e.x-=Math.cos(a)*e.spd*.75*slow*dt;e.y-=Math.sin(a)*e.spd*.75*slow*dt}else if(d>230){e.x+=Math.cos(a)*e.spd*slow*dt;e.y+=Math.sin(a)*e.spd*slow*dt}e.shoot-=dt;if(e.shoot<=0){S.enemyShots.push({x:e.x,y:e.y,vx:Math.cos(a)*185,vy:Math.sin(a)*185,life:3,dmg:12+S.time*.04,rot:a});e.shoot=4.2+rand(0,1.8)}}else{e.x+=Math.cos(a)*e.spd*slow*dt;e.y+=Math.sin(a)*e.spd*slow*dt}e.phase+=dt*TAU*4;e.hit-=dt;e.slow-=dt;if(dist(e,p)<e.r+p.r){p.hp-=((e.boss?32:e.type==='slime'?14:10)*dt);p.hit=.12}}for(const g of S.gems){let d=dist(g,p);if(d<pick){g.x+=(p.x-g.x)*dt*3.4;g.y+=(p.y-g.y)*dt*3.4}if(d<p.r+10){g.dead=true;p.xp+=g.v}}for(const m of S.proj){m.life-=dt;m.trail.push({x:m.x,y:m.y});if(m.trail.length>5)m.trail.shift();m.x+=m.vx*dt;m.y+=m.vy*dt;m.rot+=dt*8;for(const e of S.enemies)if(!m.hit.has(e)&&dist(m,e)<e.r+12){e.hp-=m.dmg;e.hit=.1;m.hit.add(e);if(m.slow)e.slow=Math.max(e.slow,m.slow);if(m.aoe){for(const n of S.enemies)if(dist(e,n)<m.aoe+n.r){n.hp-=m.dmg*.58;n.hit=.08}S.parts.push({x:e.x,y:e.y,vx:0,vy:0,life:.18,max:.18,a:1,c:'#fb923c',boom:m.aoe})}if(m.kind!=='ice')m.dead=true}}for(const a of S.axes){a.life-=dt;a.rot+=Math.PI/12;a.x+=a.vx*dt;a.y+=a.vy*dt;for(const e of S.enemies)if(!a.hit.has(e)&&dist(a,e)<e.r+16){e.hp-=a.dmg;e.hit=.1;a.hit.add(e)}}for(const s of S.enemyShots){s.life-=dt;s.x+=s.vx*dt;s.y+=s.vy*dt;s.rot+=dt*5;if(dist(s,p)<p.r+9){p.hp-=s.dmg;p.hit=.2;s.dead=true}}for(const b of S.bolts)b.life-=dt;for(const q of S.parts){q.life-=dt;q.x+=q.vx*dt;q.y+=q.vy*dt;q.a=q.life/q.max}S.gems=S.gems.filter(g=>!g.dead);S.proj=S.proj.filter(m=>!m.dead&&m.life>0);S.enemyShots=S.enemyShots.filter(s=>!s.dead&&s.life>0&&s.x>-80&&s.x<W+80&&s.y>-80&&s.y<H+80);S.axes=S.axes.filter(a=>a.life>0);S.bolts=S.bolts.filter(b=>b.life>0);S.parts=S.parts.filter(q=>q.life>0)}
function deaths(){for(const e of S.enemies)if(e.hp<=0&&!e.dead){e.dead=true;S.kills++;S.gems.push({x:e.x,y:e.y,v:e.boss?120:(e.xp||5)});for(let i=0;i<(e.boss?42:8);i++)S.parts.push({x:e.x,y:e.y,vx:rand(-80,80),vy:rand(-80,80),life:rand(.25,.7),max:.7,a:1,c:e.boss?'#111':'#f43f5e'})}S.enemies=S.enemies.filter(e=>!e.dead)}function levelCheck(){let p=S.player;while(p.xp>=p.next&&!S.paused&&!S.over){p.xp-=p.next;p.lv++;p.next=Math.floor(p.next*1.3+9);openLevel()}}
function comboName(id){let c=S.combos[id];return c?c.parts.map(k=>ATTACK_NAME[k]).join('+'):''}
function optionWeight(o){if(o.combo)return 3+S.combos[o.id].lv;let pref=CLASS_PREF[S.player.cls]||{};let w=pref[o.id]||1;if(S.skills[o.id]>0)w+=2;return w}
function pickWeighted(pool){let total=pool.reduce((s,o)=>s+optionWeight(o),0),r=Math.random()*total;for(let i=0;i<pool.length;i++){r-=optionWeight(pool[i]);if(r<=0)return pool.splice(i,1)[0]}return pool.pop()}
function comboStats(c,lv){let cp=Math.sqrt(lv)*(1.15+c.parts.length*.28);return{num:countBonus(cp),dmg:Math.round((damageMul(cp)-1)*100),range:Math.round(cp*4),cd:Math.round(Math.min(35,cp*2.5))}}
function nextNumLevel(c){let now=comboStats(c,c.lv).num;if(now>=4)return'已达数量上限';for(let lv=c.lv+1;lv<80;lv++)if(comboStats(c,lv).num>now)return`Lv.${lv}`;return'较高等级'}
function comboDesc(id){let c=S.combos[id],a=comboStats(c,c.lv),b=comboStats(c,c.lv+1);return`本次：伤害 +${a.dmg}% → +${b.dmg}%，数量 +${a.num} → +${b.num}，范围 +${a.range}% → +${b.range}%，冷却 -${a.cd}% → -${b.cd}%。下次数量提升：${nextNumLevel(c)}。`}
function openLevel(){S.paused=true;$('levelup').querySelector('.title').textContent='升级！选择一个强化';let comboWeight=S.player.lv>=20?2:1,pool=Object.keys(INFO).filter(k=>S.skills[k]<5).map(id=>({id}));for(let n=0;n<comboWeight;n++)pool=pool.concat(S.comboOrder.map(id=>({id,combo:true})));let opts=[];while(opts.length<3&&pool.length)opts.push(pickWeighted(pool));$('choices').innerHTML=opts.map(o=>o.combo?`<div class="choice" data-combo="${o.id}"><h2>${comboName(o.id)} Lv.${S.combos[o.id].lv} → Lv.${S.combos[o.id].lv+1}</h2><p>${comboDesc(o.id)}</p></div>`:`<div class="choice" data-k="${o.id}"><h2>${INFO[o.id][0]} Lv.${S.skills[o.id]} → Lv.${S.skills[o.id]+1}</h2><p>${INFO[o.id][1]}</p></div>`).join('');$('levelup').classList.remove('hidden')}
function fuseCandidates(){return ATTACK_SKILLS.filter(k=>S.skills[k]>0).concat(S.comboOrder)}
function partNames(id){return S.combos[id]?comboName(id):ATTACK_NAME[id]}
function baseParts(id){return S.combos[id]?.parts||[id]}
function canFuse(a,b){let pa=baseParts(a),pb=baseParts(b);if(a===b||pa.some(k=>pb.includes(k)))return false;let parts=[...pa,...pb];if(parts.length>4)return false;let sig=parts.slice().sort().join('+');return !S.fuseSigs.includes(sig)}
function hasFuseOption(){let opts=fuseCandidates();for(let i=0;i<opts.length;i++)for(let j=i+1;j<opts.length;j++)if(canFuse(opts[i],opts[j]))return true;return false}
function openFuse(){let opts=fuseCandidates();if(opts.length<2||!hasFuseOption()){S.paused=false;return}S.fusePick=[];$('levelup').querySelector('.title').textContent='技能合成！先选择一个攻击/组合技能';$('choices').innerHTML=opts.map(id=>`<div class="choice" data-pick="${id}"><h2>${partNames(id)}</h2><p>可与未参与当前组合的攻击/光环技能继续合成。</p></div>`).join('');$('levelup').classList.remove('hidden')}
function upgrade(k){let p=S.player;S.skills[k]++;if(k==='armor'){let add=Math.round(p.max*.18);p.max+=add;p.hp=Math.min(p.max,p.hp+25+add)}$('levelup').classList.add('hidden');if(p.lv%5===0)openFuse();else S.paused=false}
function upgradeCombo(id){S.combos[id].lv++;$('levelup').classList.add('hidden');if(S.player.lv%5===0)openFuse();else S.paused=false}
function pickFuse(id,el){if(!S.fusePick.length){S.fusePick=[id];let opts=fuseCandidates().filter(x=>canFuse(id,x));$('levelup').querySelector('.title').textContent='技能合成！再选择一个未参与技能';$('choices').innerHTML=opts.map(x=>`<div class="choice" data-pick="${x}"><h2>${partNames(id)} + ${partNames(x)}</h2><p>生成阶梯式组合；最多包含 4 个基础技能，已有相同组成不能重复。</p></div>`).join('');return}let a=S.fusePick[0],b=id;if(!canFuse(a,b)){S.fusePick=[];openFuse();return}let parts=[...new Set([...baseParts(a),...baseParts(b)])],sig=parts.slice().sort().join('+'),cid='combo'+(S.comboOrder.length+1);S.combos[cid]={parts,lv:1};S.comboOrder.push(cid);S.fuseSigs.push(sig);$('levelup').classList.add('hidden');S.paused=false}
function end(win){S.over=true;S.paused=true;$('endTitle').textContent=win?'胜利！':'失败';$('endText').textContent=win?`你击败了 Boss，共消灭 ${S.kills} 个敌人。`:`你坚持了 ${fmt(S.time)}，共消灭 ${S.kills} 个敌人。`;$('end').classList.remove('hidden')}
function drawBg(){ctx.fillStyle='#080b1b';ctx.fillRect(0,0,W,H);let bg=imgs.bg,tw=360,th=240,ox=-(S.time*14%tw),oy=-(S.time*7%th);if(bg.complete){for(let x=ox-tw;x<W+tw;x+=tw)for(let y=oy-th;y<H+th;y+=th)ctx.drawImage(bg,x,y,tw,th)}ctx.fillStyle='rgba(5,8,20,.28)';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(87,100,160,.18)';ctx.lineWidth=1;let s=48,gx=-(S.time*18%s),gy=-(S.time*9%s);for(let x=gx;x<W;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=gy;y<H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}}function drawPlayer(){let p=S.player,t=S.time,f=frameOf(t,8),bob=Math.sin(t*10)*2,rot=0,sx=1,sy=1;if(p.cls==='ranger')rot=p.vx*.09;if(p.cls==='mage'){sx=1-p.vx*.03;sy=1+p.vy*.02}if(p.hit>0){ctx.shadowColor='#fde68a';ctx.shadowBlur=16}if(S.skills.garlic){let cp=comboPower('garlic'),pulse=cp?7+Math.min(5,cp):5,r=66+skillLv('garlic')*12+cp*4+Math.sin(t*pulse)*5;drawSheet(imgs.aura,p.x,p.y,r*2,frameOf(t,pulse),0,1,1,.45)}if(S.skills.orbit){let cp=comboPower('orbit'),lv=skillLv('orbit'),count=Math.min(10,1+Math.floor(lv/2)+countBonus(cp)),rad=54+lv*8+cp*2;for(let i=0;i<count;i++){let a=t*(2.4+Math.min(.8,cp*.08))+i*TAU/count;drawSheet(imgs.star,p.x+Math.cos(a)*rad,p.y+Math.sin(a)*rad,28,frameOf(t*2+i,10),a)}}drawSheet(imgs[p.cls],p.x,p.y+bob,54,f,rot,sx,sy);ctx.shadowBlur=0;p.hit-=1/60}
function drawEnemies(){for(const e of S.enemies){if(e.boss){for(let i=0;i<14;i++){ctx.fillStyle=`rgba(0,0,0,${rand(.08,.22)})`;ctx.beginPath();ctx.arc(e.x+rand(-70,70),e.y+rand(-70,70),rand(2,6),0,TAU);ctx.fill()}drawSheet(imgs.boss,e.x,e.y,150,frameOf(S.time,4),0,1+Math.sin(S.time*3)*.03,1-Math.sin(S.time*3)*.03)}else{let q=Math.sin(e.phase)*.16,sz=e.type==='slime'?58:e.type==='eye'?48:e.type==='skeleton'?44:42;drawSheet(imgs[e.img||'imp'],e.x,e.y,sz,frameOf(S.time+e.phase,8),0,1+q,1-q)}if(e.slow>0){ctx.strokeStyle='rgba(125,211,252,.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(e.x,e.y,e.r+7,0,TAU);ctx.stroke()}if(e.hit>0){ctx.strokeStyle='rgba(255,255,255,.65)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(e.x,e.y,e.r+4,0,TAU);ctx.stroke()}ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(e.x-e.r,e.y-e.r-10,e.r*2,4);ctx.fillStyle=e.boss?'#ef4444':'#fb7185';ctx.fillRect(e.x-e.r,e.y-e.r-10,e.r*2*clamp(e.hp/e.max,0,1),4)}}
function drawFx(){for(const g of S.gems){ctx.fillStyle='#38bdf8';ctx.shadowColor='#38bdf8';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(g.x,g.y,6+Math.sin(S.time*8)*1.5,0,TAU);ctx.fill()}ctx.shadowBlur=0;for(const m of S.proj){m.trail.forEach((r,i)=>drawSheet(imgs[m.kind],r.x,r.y,18+i*2,frameOf(S.time+i,10),m.rot,1,1,(i+1)/8));drawSheet(imgs[m.kind],m.x,m.y,m.kind==='fire'?30:24,frameOf(S.time,12),m.rot)}for(const a of S.axes)drawSheet(imgs.axe,a.x,a.y,36,frameOf(S.time*2,12),a.rot);for(const s of S.enemyShots)drawSheet(imgs.enemyOrb,s.x,s.y,24,frameOf(S.time*2,12),s.rot);for(const b of S.bolts){ctx.strokeStyle='rgba(250,204,21,.95)';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(b.x-16,0);ctx.lineTo(b.x+4,b.y-36);ctx.lineTo(b.x-10,b.y-18);ctx.lineTo(b.x+12,b.y);ctx.stroke();ctx.fillStyle='rgba(250,204,21,.35)';ctx.beginPath();ctx.arc(b.x,b.y,44*(b.life/.13),0,TAU);ctx.fill()}for(const p of S.parts){ctx.globalAlpha=p.a;if(p.boom){ctx.fillStyle='rgba(251,146,60,.35)';ctx.beginPath();ctx.arc(p.x,p.y,p.boom*(1-p.a),0,TAU);ctx.fill()}else{ctx.fillStyle=p.c||'#fff';ctx.fillRect(p.x,p.y,3,3)}ctx.globalAlpha=1}}
function updateHud(){let p=S?.player;if(!p)return;$('job').textContent=p.job;$('lv').textContent=p.lv;$('tm').textContent=fmt(S.time);$('hpTxt').textContent=`${Math.ceil(p.hp)}/${p.max}`;$('xpTxt').textContent=`${Math.floor(p.xp)}/${p.next}`;$('hpFill').style.width=`${clamp(p.hp/p.max*100,0,100)}%`;$('xpFill').style.width=`${clamp(p.xp/p.next*100,0,100)}%`}function fmt(t){let m=Math.floor(t/60),s=Math.floor(t%60);return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}function tick(ts){requestAnimationFrame(tick);let dt=Math.min(.033,(ts-last)/1000||0);last=ts;if(!S||!S.run){ctx.clearRect(0,0,W,H);return}if(!S.paused){S.time+=dt;S.spawn+=dt;if(S.spawn>=spawnDelay()){S.spawn=0;for(let i=0;i<spawnCount();i++)spawnEnemy(false)}if(S.time>=S.nextBoss){spawnEnemy(true);S.nextBoss+=BOSS_INTERVAL}movePlayer(dt);skills(dt);updateObjs(dt);deaths();levelCheck();if(S.player.hp<=0)end(false);S.shake=Math.max(0,S.shake-dt);updateHud()}ctx.save();if(S.shake>0)ctx.translate(rand(-2,2),rand(-2,2));drawBg();drawFx();drawEnemies();drawPlayer();ctx.restore()}
function setMode(auto){control.auto=auto;$('modeBtn').textContent=auto?'自动模式':'手动模式';$('controls').classList.toggle('auto',auto);if(auto){control.x=0;control.y=0;moveStick(0,0)}}
function moveStick(x,y){$('stick').style.transform=`translate(${x*32}px,${y*32}px)`}
function joyMove(e){let r=$('joy').getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=e.clientX-cx,dy=e.clientY-cy,m=Math.hypot(dx,dy),lim=r.width*.36;if(m>lim){dx=dx/m*lim;dy=dy/m*lim}control.x=dx/lim;control.y=dy/lim;moveStick(control.x,control.y)}
$('classCards').innerHTML=Object.entries(CLASSES).map(([k,c])=>`<button class="card" data-c="${k}"><div class="portrait"><img src="${AS[c.card]}" alt="${c.cn}"></div><h2>${c.cn}</h2><p>HP ${c.hp} / 速度 ${c.spd}</p><p>初始技能：${INFO[c.skill][0]}</p><p>${c.desc}</p></button>`).join('');
$('modeBtn').onclick=()=>setMode(!control.auto);$('joy').addEventListener('pointerdown',e=>{if(control.auto)setMode(false);control.active=true;$('joy').setPointerCapture(e.pointerId);joyMove(e)});$('joy').addEventListener('pointermove',e=>{if(control.active)joyMove(e)});$('joy').addEventListener('pointerup',e=>{control.active=false;control.x=0;control.y=0;moveStick(0,0)});$('joy').addEventListener('pointercancel',e=>{control.active=false;control.x=0;control.y=0;moveStick(0,0)});
document.addEventListener('click',e=>{let c=e.target.closest('[data-c]');if(c)start(c.dataset.c);let ch=e.target.closest('[data-k]');if(ch)upgrade(ch.dataset.k);let co=e.target.closest('[data-combo]');if(co)upgradeCombo(co.dataset.combo);let pk=e.target.closest('[data-pick]');if(pk)pickFuse(pk.dataset.pick,pk)});$('restart').onclick=restart;requestAnimationFrame(tick);
})();
</script>
