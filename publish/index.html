function updateObjs(dt){let p=S.player,bn=artifactBonus(),pick=110*(1+S.skills.magnet*.22+bn.mag);for(const e of S.enemies){let d=dist(e,p),a=Math.atan2(p.y-e.y,p.x-e.x),slow=e.slow>0?.55:1;if(e.type==='eye'&&!e.boss){if(d<170){e.x-=Math.cos(a)*e.spd*.75*slow*dt;e.y-=Math.sin(a)*e.spd*.75*slow*dt}else if(d>230){e.x+=Math.cos(a)*e.spd*slow*dt;e.y+=Math.sin(a)*e.spd*slow*dt}e.shoot-=dt;if(e.shoot<=0){S.enemyShots.push({x:e.x,y:e.y,vx:Math.cos(a)*185,vy:Math.sin(a)*185,life:3,dmg:12+S.time*.04,rot:a});e.shoot=4.2+rand(0,1.8)}}else{e.x+=Math.cos(a)*e.spd*slow*dt;e.y+=Math.sin(a)*e.spd*slow*dt}e.phase+=dt*TAU*4;e.hit-=dt;e.slow-=dt;if(dist(e,p)<e.r+p.r){p.hp-=((e.boss?32:e.type==='slime'?14:10)*(1-(S.relicLv.guard||0)*.08)*dt);p.hit=.12}}for(const g of S.gems){let d=dist(g,p);if(d<pick){g.x+=(p.x-g.x)*dt*3.4;g.y+=(p.y-g.y)*dt*3.4}if(d<p.r+10){g.dead=true;p.xp+=g.v}}for(const d of S.drops){d.life-=dt;if(dist(d,p)<p.r+22){d.dead=true;if(!S.bag.includes(d.id)&&!S.artifacts.includes(d.id)&&S.bag.length<24){S.bag.push(d.id);saveGame()}S.parts.push({x:p.x,y:p.y,vx:0,vy:0,life:.5,max:.5,a:1,c:'#facc15',boom:70})}}for(const m of S.proj){m.life-=dt;m.trail.push({x:m.x,y:m.y});if(m.trail.length>5)m.trail.shift();m.x+=m.vx*dt;m.y+=m.vy*dt;m.rot+=dt*8;for(const e of S.enemies)if(!m.hit.has(e)&&dist(m,e)<e.r+12){e.hp-=m.dmg;e.hit=.1;m.hit.add(e);if(m.slow)e.slow=Math.max(e.slow,m.slow);if(m.aoe){for(const n of S.enemies)if(dist(e,n)<m.aoe+n.r){n.hp-=m.dmg*.58;n.hit=.08}S.parts.push({x:e.x,y:e.y,vx:0,vy:0,life:.18,max:.18,a:1,c:'#fb923c',boom:m.aoe})}if(m.kind!=='ice')m.dead=true}}for(const a of S.axes){a.life-=dt;a.rot+=Math.PI/12;a.x+=a.vx*dt;a.y+=a.vy*dt;for(const e of S.enemies)if(!a.hit.has(e)&&dist(a,e)<e.r+16){e.hp-=a.dmg;e.hit=.1;a.hit.add(e)}}for(const s of S.enemyShots){s.life-=dt;s.x+=s.vx*dt;s.y+=s.vy*dt;s.rot+=dt*5;if(dist(s,p)<p.r+9){p.hp-=s.dmg;p.hit=.2;s.dead=true}}for(const b of S.bolts)b.life-=dt;for(const f of S.artFx)f.life-=dt;for(const q of S.parts){q.life-=dt;q.x+=q.vx*dt;q.y+=q.vy*dt;q.a=q.life/q.max}S.gems=S.gems.filter(g=>!g.dead);S.drops=S.drops.filter(d=>!d.dead&&d.life>0);S.proj=S.proj.filter(m=>!m.dead&&m.life>0);S.enemyShots=S.enemyShots.filter(s=>!s.dead&&s.life>0&&s.x>-80&&s.x<W+80&&s.y>-80&&s.y<H+80);S.axes=S.axes.filter(a=>a.life>0);S.bolts=S.bolts.filter(b=>b.life>0);S.artFx=S.artFx.filter(f=>f.life>0);S.parts=S.parts.filter(q=>q.life>0)}
function deaths(){for(const e of S.enemies)if(e.hp<=0&&!e.dead){e.dead=true;S.kills++;S.gold+=e.boss?45:rand(1,4)|0;S.gems.push({x:e.x,y:e.y,v:e.boss?120:(e.xp||5)});if(e.boss){let owned=new Set([...S.bag,...S.artifacts]),choices=ARTIFACTS.filter(a=>!owned.has(a[0]));if(choices.length){let a=choices[Math.floor(rand(0,choices.length))];S.drops.push({x:e.x,y:e.y,id:a[0],i:ARTIFACTS.findIndex(v=>v[0]===a[0]),life:18})}}for(let i=0;i<(e.boss?42:8);i++)S.parts.push({x:e.x,y:e.y,vx:rand(-80,80),vy:rand(-80,80),life:rand(.25,.7),max:.7,a:1,c:e.boss?'#111':'#f43f5e'})}S.enemies=S.enemies.filter(e=>!e.dead)}function levelCheck(){let p=S.player;while(p.xp>=p.next&&!S.paused&&!S.over){p.xp-=p.next;p.lv++;p.next=Math.floor(p.next*1.3+9);openLevel()}}
function comboName(id){let c=S.combos[id];return c?c.parts.map(k=>ATTACK_NAME[k]).join('+'):''}
function optionWeight(o){if(o.combo)return 3+S.combos[o.id].lv;let pref=CLASS_PREF[S.player.cls]||{};let w=pref[o.id]||1;if(S.skills[o.id]>0)w+=2;return w}
function pickWeighted(pool){let total=pool.reduce((s,o)=>s+optionWeight(o),0),r=Math.random()*total;for(let i=0;i<pool.length;i++){r-=optionWeight(pool[i]);if(r<=0)return pool.splice(i,1)[0]}return pool.pop()}
function comboStats(c,lv){let cp=Math.sqrt(lv)*(1.15+c.parts.length*.28);return{num:countBonus(cp),dmg:Math.round((damageMul(cp)-1)*100),range:Math.round(cp*4),cd:Math.round(Math.min(35,cp*2.5))}}
function nextNumLevel(c){let now=comboStats(c,c.lv).num;if(now>=4)return'已达数量上限';for(let lv=c.lv+1;lv<80;lv++)if(comboStats(c,lv).num>now)return`Lv.${lv}`;return'较高等级'}
function comboDesc(id){let c=S.combos[id],a=comboStats(c,c.lv),b=comboStats(c,c.lv+1);return`本次：伤害 +${a.dmg}% → +${b.dmg}%，数量 +${a.num} → +${b.num}，范围 +${a.range}% → +${b.range}%，冷却 -${a.cd}% → -${b.cd}%。下次数量提升：${nextNumLevel(c)}。`}
function openLevel(){S.paused=true;$('levelup').querySelector('.title').textContent='升级！选择一个强化';let comboWeight=S.player.lv>=20?2:1,pool=Object.keys(INFO).filter(k=>S.skills[k]<5).map(id=>({id}));for(let n=0;n<comboWeight;n++)pool=pool.concat(S.comboOrder.map(id=>({id,combo:true})));let opts=[];while(opts.length<3&&pool.length)opts.push(pickWeighted(pool));$('choices').innerHTML=opts.map(o=>o.combo?`<div class="choice" data-combo="${o.id}"><h2>✦ 组合刻印 · ${comboName(o.id)}</h2><p>Lv.${S.combos[o.id].lv} → Lv.${S.combos[o.id].lv+1}</p><p>${comboDesc(o.id)}</p></div>`:`<div class="choice" data-k="${o.id}"><h2>✦ ${INFO[o.id][0]}</h2><p>Lv.${S.skills[o.id]} → Lv.${S.skills[o.id]+1}</p><p>${INFO[o.id][1]}</p></div>`).join('');$('levelup').classList.remove('hidden')}
function fuseCandidates(){return ATTACK_SKILLS.filter(k=>S.skills[k]>0).concat(S.comboOrder)}
function partNames(id){return S.combos[id]?comboName(id):ATTACK_NAME[id]}

function canFuse(a,b){let pa=baseParts(a),pb=baseParts(b);if(a===b||pa.some(k=>pb.includes(k)))return false;let parts=[...pa,...pb];if(parts.length>4)return false;let sig=parts.slice().sort().join('+');return !S.fuseSigs.includes(sig)}
function hasFuseOption(){let opts=fuseCandidates();for(let i=0;i<opts.length;i++)for(let j=i+1;j<opts.length;j++)if(canFuse(opts[i],opts[j]))return true;return false}
function openFuse(){let opts=fuseCandidates();if(opts.length<2||!hasFuseOption()){S.paused=false;return}S.fusePick=[];$('levelup').querySelector('.title').textContent='技能合成！先选择一个攻击/组合技能';$('choices').innerHTML=opts.map(id=>`<div class="choice" data-pick="${id}"><h2>${partNames(id)}</h2><p>可与未参与当前组合的攻击/光环技能继续合成。</p></div>`).join('');$('levelup').classList.remove('hidden')}

function drawBg(){ctx.fillStyle='#080b1b';ctx.fillRect(0,0,W,H);let bg=imgs.bg,tw=360,th=240,ox=-(S.time*14%tw),oy=-(S.time*7%th);if(bg.complete){for(let x=ox-tw;x<W+tw;x+=tw)for(let y=oy-th;y<H+th;y+=th)ctx.drawImage(bg,x,y,tw,th)}ctx.fillStyle='rgba(5,8,20,.28)';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(87,100,160,.18)';ctx.lineWidth=1;let s=48,gx=-(S.time*18%s),gy=-(S.time*9%s);for(let x=gx;x<W;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=gy;y<H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}}function drawPlayer(){let p=S.player,t=S.time,f=frameOf(t,8),bob=Math.sin(t*10)*2,rot=0,sx=1,sy=1;if(p.cls==='ranger')rot=p.vx*.09;if(p.cls==='mage'){sx=1-p.vx*.03;sy=1+p.vy*.02}let ri={paladin:0,mage:1,ranger:2}[p.cls],rx=p.x-34,ry=p.y-28+Math.sin(t*4)*4;drawGrid(imgs.classRelics,rx,ry,42,ri,3,1,.95);if(p.hit>0){ctx.shadowColor='#fde68a';ctx.shadowBlur=16}if(S.skills.garlic){let cp=comboPower('garlic'),pulse=cp?7+Math.min(5,cp):5,r=66+skillLv('garlic')*12+cp*4+Math.sin(t*pulse)*5;drawSheet(imgs.aura,p.x,p.y,r*2,frameOf(t,pulse),0,1,1,.45)}if(S.skills.orbit){let cp=comboPower('orbit'),lv=skillLv('orbit'),count=Math.min(10,1+Math.floor(lv/2)+countBonus(cp)),rad=54+lv*8+cp*2;for(let i=0;i<count;i++){let a=t*(2.4+Math.min(.8,cp*.08))+i*TAU/count;drawSheet(imgs.star,p.x+Math.cos(a)*rad,p.y+Math.sin(a)*rad,28,frameOf(t*2+i,10),a)}}drawSheet(imgs[p.cls],p.x,p.y+bob,54,f,rot,sx,sy);ctx.shadowBlur=0;p.hit-=1/60}
function drawEnemies(){for(const e of S.enemies){if(e.boss){for(let i=0;i<14;i++){ctx.fillStyle=`rgba(0,0,0,${rand(.08,.22)})`;ctx.beginPath();ctx.arc(e.x+rand(-70,70),e.y+rand(-70,70),rand(2,6),0,TAU);ctx.fill()}drawSheet(imgs.boss,e.x,e.y,150,frameOf(S.time,4),0,1+Math.sin(S.time*3)*.03,1-Math.sin(S.time*3)*.03)}else{let q=Math.sin(e.phase)*.16,sz=e.type==='slime'?58:e.type==='eye'?48:e.type==='skeleton'?44:42;drawSheet(imgs[e.img||'imp'],e.x,e.y,sz,frameOf(S.time+e.phase,8),0,1+q,1-q)}if(e.slow>0){ctx.strokeStyle='rgba(125,211,252,.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(e.x,e.y,e.r+7,0,TAU);ctx.stroke()}if(e.hit>0){ctx.strokeStyle='rgba(255,255,255,.65)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(e.x,e.y,e.r+4,0,TAU);ctx.stroke()}ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(e.x-e.r,e.y-e.r-10,e.r*2,4);ctx.fillStyle=e.boss?'#ef4444':'#fb7185';ctx.fillRect(e.x-e.r,e.y-e.r-10,e.r*2*clamp(e.hp/e.max,0,1),4)}}
function drawFx(){for(const g of S.gems){ctx.fillStyle='#38bdf8';ctx.shadowColor='#38bdf8';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(g.x,g.y,6+Math.sin(S.time*8)*1.5,0,TAU);ctx.fill()}for(const d of S.drops){ctx.shadowColor='#facc15';ctx.shadowBlur=18;drawGrid(imgs.artifactIcons,d.x,d.y+Math.sin(S.time*5)*4,44,d.i,5,2)}ctx.shadowBlur=0;for(const f of S.artFx){let a=f.life/f.max;drawGrid(imgs.artifactFx,f.x,f.y,f.size*(1.15-a*.25),f.i,5,2,a);ctx.strokeStyle=`rgba(250,204,21,${a*.55})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(f.x,f.y,f.size*(1-a)*.55,0,TAU);ctx.stroke()}for(const m of S.proj){m.trail.forEach((r,i)=>drawSheet(imgs[m.kind],r.x,r.y,18+i*2,frameOf(S.time+i,10),m.rot,1,1,(i+1)/8));drawSheet(imgs[m.kind],m.x,m.y,m.kind==='fire'?30:24,frameOf(S.time,12),m.rot)}for(const a of S.axes)drawSheet(imgs.axe,a.x,a.y,36,frameOf(S.time*2,12),a.rot);for(const s of S.enemyShots)drawSheet(imgs.enemyOrb,s.x,s.y,24,frameOf(S.time*2,12),s.rot);for(const b of S.bolts){ctx.strokeStyle='rgba(250,204,21,.95)';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(b.x-16,0);ctx.lineTo(b.x+4,b.y-36);ctx.lineTo(b.x-10,b.y-18);ctx.lineTo(b.x+12,b.y);ctx.stroke();ctx.fillStyle='rgba(250,204,21,.35)';ctx.beginPath();ctx.arc(b.x,b.y,44*(b.life/.13),0,TAU);ctx.fill()}for(const p of S.parts){ctx.globalAlpha=p.a;if(p.boom){ctx.fillStyle='rgba(251,146,60,.35)';ctx.beginPath();ctx.arc(p.x,p.y,p.boom*(1-p.a),0,TAU);ctx.fill()}else{ctx.fillStyle=p.c||'#fff';ctx.fillRect(p.x,p.y,3,3)}ctx.globalAlpha=1}}
function updateHud(){let p=S?.player;if(!p)return;$('job').textContent=p.job;$('lv').textContent=p.lv;$('tm').textContent=fmt(S.time);$('gold').textContent=S.gold;$('hpTxt').textContent=`${Math.ceil(p.hp)}/${p.max}`;$('xpTxt').textContent=`${Math.floor(p.xp)}/${p.next}`;$('hpFill').style.width=`${clamp(p.hp/p.max*100,0,100)}%`;$('xpFill').style.width=`${clamp(p.xp/p.next*100,0,100)}%`}function fmt(t){let m=Math.floor(t/60),s=Math.floor(t%60);return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}function tick(ts){requestAnimationFrame(tick);let dt=Math.min(.033,(ts-last)/1000||0);last=ts;if(!S||!S.run){ctx.clearRect(0,0,W,H);return}if(!S.paused){S.time+=dt;S.spawn+=dt;if(S.spawn>=spawnDelay()){S.spawn=0;for(let i=0;i<spawnCount();i++)spawnEnemy(false)}if(S.time>=S.nextBoss){spawnEnemy(true);S.nextBoss+=BOSS_INTERVAL}movePlayer(dt);skills(dt);artifactSkills(dt);relicSkills(dt);updateObjs(dt);deaths();levelCheck();if(S.player.hp<=0)end(false);S.shake=Math.max(0,S.shake-dt);saveAt+=dt;if(saveAt>10){saveAt=0;saveGame()}updateHud()}ctx.save();if(S.shake>0)ctx.translate(rand(-2,2),rand(-2,2));drawBg();drawFx();drawEnemies();drawPlayer();ctx.restore()}

function safeName(...vals){for(let v of vals){let s=String(v||'').trim();if(s&&s!=='null'&&s!=='undefined'&&!/^匿名/.test(s))return s.slice(0,16)}return'匿名勇士'}
function esc(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function renderBoard(board){if(!board?.length){$('boardList').innerHTML='<div class="choice">暂无排行，先打一局上传成绩。</div>';return}$('boardList').innerHTML=board.map((r,i)=>`<div class="choice boardRow"><b>#${i+1}</b><span class="boardName">${esc(safeName(r.name,r.playerName,r.userName,r.displayName,r.nickname))}</span><span class="boardLv">Lv.${Math.max(1,Math.floor(Number(r.level)||1))}</span><b class="boardTime">${fmt(r.time||0)}</b></div>`).join('')}
async function openBoard(){if(boardBusy)return;boardBusy=true;$('boardSub').textContent='加载中...';$('boardList').innerHTML='<div class="choice">正在读取全服前十名</div>';$('leaderboard').classList.remove('hidden');if(S)S.paused=true;try{let r=await invokeFn('leaderboard',{method:'list'});renderBoard(r.board);$('boardSub').textContent='存活时间前十名'}catch(e){$('boardSub').textContent=e.code==='function_not_published'?'排行榜函数还未发布，请保存游戏后上线':'排行榜加载失败';$('boardList').innerHTML=`<div class="choice">${e.message||'请稍后重试'}</div>`}finally{boardBusy=false}}
async function playerNameFields(){try{let u=await dzmm.user.info(),name=safeName(u?.name,u?.displayName,u?.nickname,u?.username);return{playerName:name,userName:name,displayName:name,nickname:name,name}}catch(e){console.error('获取玩家名字失败:',e.code,e.message,e.stack);return{}}}
async function submitScore(){if(!S?.player)return;try{let names=await playerNameFields();let r=await invokeFn('leaderboard',{method:'submit',args:{time:S.time,job:S.player.job,level:S.player.lv,kills:S.kills,...names}});renderBoard(r.board)}catch(e){console.error('排行榜提交失败:',e.code,e.message,e.stack)}}
function openInventory(){let p=S.player,b=artifactBonus();$('statusBox').innerHTML=`<div class="statusPortrait"><img src="${AS[CLASSES[p.cls].card]}" alt="${p.job}"></div><div class="equipSlots">${[0,1].map(i=>{let id=S.artifacts[i],a=id&&artDef(id),idx=id?artIndex(id):0;return `<button class="equipSlot" ${id?`data-unequip="${id}"`:''}>${id?artIcon(idx):'<span>空槽位</span>'}<b>${a?a[1]:'通用神器'}</b></button>`}).join('')}</div><div class="statList"><div><span>职业</span><b>${p.job}</b></div><div><span>等级</span><b>${p.lv}</b></div><div><span>生命</span><b>${Math.ceil(p.hp)}/${p.max}</b></div><div><span>伤害加成</span><b>+${Math.round((S.skills.focus*.12+b.dmg+(S.relicLv.pages||0)*.08)*100)}%</b></div><div><span>速度</span><b>${Math.round(p.base*(1+S.skills.foot*.12+b.spd+(S.relicLv.gear||0)*.08))}</b></div><div><span>金币</span><b>${S.gold}</b></div></div>`;$('bagGrid').innerHTML=Array.from({length:24},(_,i)=>{let id=S.bag[i],a=id&&artDef(id),idx=id?artIndex(id):0,eq=id&&S.artifacts.includes(id);return `<button class="bagCell ${id?'owned':''} ${eq?'equipped':''}" ${id?`data-artifact="${id}"`:''}>${id?artIcon(idx):'<span>空</span>'}<small>${a?a[1]:''}</small></button>`}).join('');$('inventory').classList.remove('hidden');S.paused=true}
function equipArtifact(id){if(S.artifacts.includes(id))return;if(S.artifacts.length>=ARTIFACT_LIMIT)return;S.artifacts.push(id);S.artCd[id]=0;applyArtifactStats();openInventory();updateHud();saveGame()}
function unequipArtifact(id){S.artifacts=S.artifacts.filter(x=>x!==id);delete S.artCd[id];applyArtifactStats();openInventory();updateHud();saveGame()}
function setMode(auto){control.auto=auto;$('modeBtn').textContent=auto?'自动模式':'手动模式';$('controls').classList.toggle('auto',auto);if(auto){control.x=0;control.y=0;moveStick(0,0)}}
function moveStick(x,y){$('stick').style.transform=`translate(${x*32}px,${y*32}px)`}
function joyMove(e){let r=$('joy').getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=e.clientX-cx,dy=e.clientY-cy,m=Math.hypot(dx,dy),lim=r.width*.36;if(m>lim){dx=dx/m*lim;dy=dy/m*lim}control.x=dx/lim;control.y=dy/lim;moveStick(control.x,control.y)}
$('classCards').innerHTML=Object.entries(CLASSES).map(([k,c])=>`<button class="card" data-c="${k}"><div class="portrait"><img src="${AS[c.card]}" alt="${c.cn}"></div><h2>${c.cn}</h2><p><b>✦ 属性</b> HP ${c.hp} / 速度 ${c.spd}</p><p><b>✦ 初始刻印</b> ${INFO[c.skill][0]}</p><p>${c.desc}</p></button>`).join('');
$('newBtn').onclick=()=>{$('start').classList.add('hidden');$('classSelect').classList.remove('hidden')};$('classBack').onclick=()=>{$('classSelect').classList.add('hidden');$('start').classList.remove('hidden')};$('loadBtn').onclick=loadGame;$('boardBtn').onclick=openBoard;$('saveBtn').onclick=saveGame;$('modeBtn').onclick=()=>setMode(!control.auto);$('joy').addEventListener('pointerdown',e=>{if(control.auto)setMode(false);control.active=true;$('joy').setPointerCapture(e.pointerId);joyMove(e)});$('joy').addEventListener('pointermove',e=>{if(control.active)joyMove(e)});$('joy').addEventListener('pointerup',e=>{control.active=false;control.x=0;control.y=0;moveStick(0,0)});$('joy').addEventListener('pointercancel',e=>{control.active=false;control.x=0;control.y=0;moveStick(0,0)});
document.addEventListener('click',e=>{let c=e.target.closest('[data-c]');if(c)start(c.dataset.c);let ch=e.target.closest('[data-k]');if(ch)upgrade(ch.dataset.k);let co=e.target.closest('[data-combo]');if(co)upgradeCombo(co.dataset.combo);let pk=e.target.closest('[data-pick]');if(pk)pickFuse(pk.dataset.pick,pk);let rn=e.target.closest('[data-relic]');if(rn)buyRelic(rn.dataset.relic);let ar=e.target.closest('[data-artifact]');if(ar)equipArtifact(ar.dataset.artifact);let un=e.target.closest('[data-unequip]');if(un)unequipArtifact(un.dataset.unequip)});$('relicBtn').onclick=openTree;$('invBtn').onclick=openInventory;$('treeClose').onclick=()=>{$('relicTree').classList.add('hidden');S.paused=false};$('invClose').onclick=()=>{$('inventory').classList.add('hidden');S.paused=false};$('boardClose').onclick=()=>{$('leaderboard').classList.add('hidden');if(S)S.paused=false};$('restart').onclick=restart;requestAnimationFrame(tick);
})();
</script>
</body>
</html>
